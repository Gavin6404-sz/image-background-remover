name: Cloudflare Pages Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --prefer-offline

      - name: Build
        run: yarn run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy out/ --project-name=image-background-remover --branch=production

      - name: Update DNS CNAME for www
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ vars.CLOUDFLARE_ZONE_ID }}/dns_records/${{ vars.CLOUDFLARE_DNS_RECORD_ID }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"content":"image-background-remover-bz5.pages.dev","name":"www.imagetoolbox.online","type":"CNAME"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('DNS updated:', 'success' if d.get('success') else d.get('errors'))"
